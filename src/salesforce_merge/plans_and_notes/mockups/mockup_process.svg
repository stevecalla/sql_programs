    <text x="270" y="484" fill="#6b7686" font-size="12">started from Duplicates → preview → confirm</text>
    <text x="610" y="484" fill="#888780" font-size="12">Phase 3</text>
    <text x="748" y="484" fill="#888780" font-size="12" text-anchor="end">◷ Planned</text>
