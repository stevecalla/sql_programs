    <line x1="320" y1="200" x2="390" y2="200" stroke="#e2e7f0" stroke-width="2"/>
    <circle cx="410" cy="200" r="14" fill="#f1efe8"/><text x="410" y="205" fill="#888780" font-size="11" text-anchor="middle">·</text><text x="410" y="232" fill="#b4b2a9" font-size="11" text-anchor="middle">Nickname</text>
    <line x1="430" y1="200" x2="500" y2="200" stroke="#e2e7f0" stroke-width="2"/>
    <circle cx="520" cy="200" r="14" fill="#f1efe8"/><text x="520" y="205" fill="#888780" font-size="11" text-anchor="middle">·</text><text x="520" y="232" fill="#b4b2a9" font-size="11" text-anchor="middle">Consolidate</text>
    <line x1="540" y1="200" x2="640" y2="200" stroke="#e2e7f0" stroke-width="2"/>
    <circle cx="660" cy="200" r="14" fill="#f1efe8"/><text x="660" y="205" fill="#888780" font-size="11" text-anchor="middle">·</text><text x="660" y="232" fill="#b4b2a9" font-size="11" text-anchor="middle">Persist</text>
