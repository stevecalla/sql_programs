    <circle cx="190" cy="200" r="14" fill="#e6f5ec"/><text x="190" y="205" fill="#1a8a4f" font-size="13" text-anchor="middle">✓</text><text x="190" y="232" fill="#6b7686" font-size="11" text-anchor="middle">Exact</text>
