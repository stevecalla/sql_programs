<svg xmlns="http://www.w3.org/2000/svg" width="620" height="540" viewBox="0 0 620 540" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="620" height="540" fill="#f4f6fb"/>
  <text x="20" y="34" fill="#6b7686" font-size="12">Duplicates › cluster CL-1832 › Merge</text>

  <rect x="20" y="48" width="560" height="472" rx="12" fill="#ffffff" stroke="#e2e7f0"/>
  <text x="38" y="78" fill="#1c2433" font-size="14" font-weight="600">Merge cluster CL-1832</text>
  <text x="240" y="78" fill="#6b7686" font-size="12">3 accounts → 1</text>
  <text x="560" y="78" fill="#6b7686" font-size="14" text-anchor="end">✕</text>

  <!-- stepper -->
  <text x="44" y="112" fill="#1a8a4f" font-size="11">✓ Review</text>
  <line x1="100" y1="108" x2="170" y2="108" stroke="#e2e7f0" stroke-width="2"/>
  <text x="178" y="112" fill="#1a8a4f" font-size="11">✓ Dry-run</text>
  <line x1="240" y1="108" x2="300" y2="108" stroke="#e2e7f0" stroke-width="2"/>
  <text x="308" y="112" fill="#e4002b" font-size="11" font-weight="600">● Confirm</text>
  <line x1="372" y1="108" x2="430" y2="108" stroke="#e2e7f0" stroke-width="2"/>
  <text x="438" y="112" fill="#b4b2a9" font-size="11">Execute</text>
  <line x1="486" y1="108" x2="520" y2="108" stroke="#e2e7f0" stroke-width="2"/>
  <text x="528" y="112" fill="#b4b2a9" font-size="11">Done</text>

  <!-- winner -->
  <rect x="38" y="130" width="524" height="46" rx="8" fill="#e6f5ec" stroke="#9fd9bd"/>
  <text x="54" y="150" fill="#1a8a4f" font-size="13">🏆</text>
  <text x="78" y="150" fill="#1c2433" font-size="13" font-weight="600">Jon Smith</text>
  <text x="170" y="150" fill="#6b7686" font-size="12" font-family="monospace">001A…7Qa</text>
  <text x="546" y="150" fill="#1a8a4f" font-size="11" text-anchor="end">Winner · Id = merge_id · keeps record</text>
  <text x="78" y="167" fill="#6b7686" font-size="11">winning account</text>

  <!-- loser 1 -->
  <rect x="38" y="184" width="524" height="56" rx="8" fill="#ffffff" stroke="#e2e7f0"/>
  <text x="78" y="206" fill="#1c2433" font-size="13">Jonathan Smith</text>
  <text x="190" y="206" fill="#6b7686" font-size="12" font-family="monospace">001B…3Lk</text>
  <text x="546" y="206" fill="#c0392b" font-size="11" text-anchor="end">Merged → Recycle Bin (15d)</text>
  <text x="54" y="228" fill="#3c3489" font-size="11">🛡 Donor flag — preserving contact points (email, phone)</text>

  <!-- loser 2 -->
  <rect x="38" y="248" width="524" height="40" rx="8" fill="#ffffff" stroke="#e2e7f0"/>
  <text x="78" y="272" fill="#1c2433" font-size="13">J Smith</text>
  <text x="190" y="272" fill="#6b7686" font-size="12" font-family="monospace">001C…9Rd</text>
  <text x="546" y="272" fill="#c0392b" font-size="11" text-anchor="end">Merged → Recycle Bin (15d)</text>

  <!-- dry-run -->
  <rect x="38" y="300" width="524" height="44" rx="8" fill="#f4f6fb"/>
  <text x="54" y="320" fill="#1a8a4f" font-size="12">✓ Dry-run: no blocking issues.</text>
  <text x="54" y="336" fill="#6b7686" font-size="12">Reparents 4 child records — 2 opportunities, 1 case, 1 contact point email.</text>

  <!-- confirm -->
  <rect x="38" y="360" width="270" height="38" rx="8" fill="#e4002b"/>
  <text x="173" y="384" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">⑃ Type CONFIRM to execute</text>
  <text x="320" y="384" fill="#6b7686" font-size="11">Writes off by default · sandbox first · fully logged</text>

  <text x="38" y="430" fill="#888780" font-size="11">Phase 3 — this flow logs to the Process activity feed when executed.</text>
</svg>
