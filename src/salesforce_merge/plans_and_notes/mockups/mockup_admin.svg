  <text x="946" y="276" font-size="12" fill="#374151">42</text>
  <!-- row 2 -->
  <circle cx="378" cy="307" r="7" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="430" y="312" font-size="12" fill="#111827">Jon Smith · 001…BBB</text>
  <text x="560" y="312" font-size="12" fill="#374151">2021-08-02</text>
