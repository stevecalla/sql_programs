  <rect x="358" y="254" width="640" height="34" fill="#eff6ff"/>
  <circle cx="378" cy="271" r="7" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><circle cx="378" cy="271" r="3.5" fill="#2563eb"/>
