  <text x="560" y="348" font-size="12" fill="#374151">2022-11-20</text>
  <text x="650" y="348" font-size="12" fill="#374151">2023-09-01</text>
  <text x="770" y="348" font-size="12" fill="#374151">js@y.com</text>
  <text x="946" y="348" font-size="12" fill="#374151">3</text>
  <line x1="358" y1="364" x2="998" y2="364" stroke="#e5e7eb"/>

  <!-- survivorship + impact -->
  <rect x="358" y="380" width="312" height="150" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="374" y="404" font-size="13" font-weight="bold" fill="#111827">Field survivorship</text>
  <text x="374" y="428" font-size="12" fill="#374151">Email      → master (jsmith@x.com)</text>
  <text x="374" y="450" font-size="12" fill="#374151">Phone      → from 001…BBB</text>
  <text x="374" y="472" font-size="12" fill="#374151">Birthdate  → master</text>
  <text x="374" y="494" font-size="12" fill="#374151">Member #   → master</text>
  <text x="374" y="518" font-size="11" fill="#9ca3af">defaults = master; click a field to override</text>

  <rect x="686" y="380" width="312" height="150" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="702" y="404" font-size="13" font-weight="bold" fill="#111827">Impact preview (dry-run)</text>
  <text x="702" y="428" font-size="12" fill="#374151">2 records will be merged into master</text>
  <text x="702" y="450" font-size="12" fill="#374151">10 child records reparent (opps, memberships…)</text>
  <text x="702" y="472" font-size="12" fill="#374151">2 losing accounts → Recycle Bin (~15 days)</text>
  <text x="702" y="494" font-size="12" fill="#374151">Pre-merge snapshot will be captured</text>
  <text x="702" y="518" font-size="11" fill="#9ca3af">2 Apex merge calls (1 master + ≤2 each)</text>

  <!-- actions -->
  <rect x="358" y="556" width="220" height="44" rx="8" fill="#2563eb"/>
