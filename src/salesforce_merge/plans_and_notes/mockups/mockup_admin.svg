  <rect x="594" y="556" width="220" height="44" rx="8" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="704" y="583" font-size="14" font-weight="bold" fill="#9ca3af" text-anchor="middle">🔒 Execute merge</text>
  <text x="358" y="624" font-size="11" fill="#9ca3af">Execute is disabled: requires ENABLE_MERGE_EXECUTION=true, dry-run off, and a confirmation token from the preview.</text>

  <!-- audit note -->
  <line x1="358" y1="648" x2="998" y2="648" stroke="#e5e7eb"/>
  <text x="358" y="676" font-size="11" fill="#6b7280">All writes go through one chokepoint (src/merge_execute.js) using the write-enabled SF user. Every action is logged to salesforce_merge_history.</text>
  <text x="358" y="700" font-size="11" fill="#6b7280">Restore data (losing records + child links + master fields) is saved to salesforce_merge_premerge_snapshot before execution.</text>
</svg>
