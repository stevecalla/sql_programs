  *{box-sizing:border-box} html,body{margin:0;padding:0;height:100%}

  .atable{border-collapse:collapse;font-size:12px;width:100%} .atable th,.atable td{border:1px solid var(--line);padding:3px 6px;text-align:left;white-space:nowrap} .atable th{background:var(--card);position:sticky;top:0}
  .elink{color:var(--accent);text-decoration:underline;cursor:pointer;word-break:break-all}

  .badge{font-weight:800;font-size:12.5px;padding:4px 10px;border-radius:9px;display:inline-block}

  .note{font-size:12px;color:var(--dim);margin-top:6px} .warn{color:var(--amber)} .ok{color:var(--green)} .err{color:var(--red);font-size:13px;min-height:16px}
  .askitem{border:1px solid var(--line);border-radius:9px;padding:8px;margin-bottom:7px;background:var(--bg)}
  .askitem .q{font-weight:600;display:flex;justify-content:space-between;gap:8px;align-items:baseline} .qtime{color:var(--dim);font-weight:400;font-size:11px;white-space:nowrap} .askitem .a{white-space:pre-wrap;margin-top:4px}
  #askHist{max-height:240px;overflow:auto;margin-bottom:4px}
  .filelist{font-size:12.5px} .filelist .fi{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px dashed var(--line)}
  .center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px} .login{width:360px}
  label.inline{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--dim);cursor:pointer;min-height:0}
  input[type=checkbox]{width:16px;height:16px;min-height:0;margin:0;cursor:pointer;flex:0 0 auto;accent-color:var(--accent)}
  /* ---- mobile / narrow screens: stack the 3 panes, hide drag splitters ---- */

    html,body{height:auto}

    .pane{overflow:visible; height:auto; border-bottom:1px solid var(--line)}
    #left{max-height:52vh; overflow:auto}
    .app-header{flex-wrap:wrap; gap:8px; padding:10px 12px}
    .app-header h1{font-size:18px}
    .thread-head{position:static}
    .mhtml{height:320px}
    .modal{max-width:96vw} .modal-b iframe{height:60vh}

<script>
const $ = function (sel, el) { return (el || document).querySelector(sel); };
function el(tag, attrs, kids) {
  const e = document.createElement(tag);
  for (const k in (attrs || {})) { if (k === 'class') e.className = attrs[k]; else if (k === 'html') e.innerHTML = attrs[k]; else if (k.slice(0,2) === 'on') e.addEventListener(k.slice(2), attrs[k]); else e.setAttribute(k, attrs[k]); }
  (kids || []).forEach(function (c) { if (c == null) return; e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}
async function api(path, opts) {
  const r = await fetch(path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts));
  let j = {}; try { j = await r.json(); } catch (e) {}
  if (r.status === 401) { renderLogin('Session expired - please sign in.'); throw new Error('unauthorized'); }
  if (!r.ok || j.ok === false) throw new Error((j && j.error) || ('HTTP ' + r.status));
  return j;
}
function copyText(t, msg) {
  function ok() { /* success shown via the button flashing checked */ }
  function fallback() {
    try { const ta = document.createElement('textarea'); ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); ok(); }
    catch (e) { if (msg) { msg.className = 'note warn'; msg.textContent = 'Copy failed - select the text and copy manually.'; } }
  }
  try { if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(t).then(ok, fallback); return; } } catch (e) {}
  fallback();
}
// ---- theme (transform-style sun/moon) ----
function effective_dark(){ let t=null; try{t=localStorage.getItem('eq_theme');}catch(e){} if(t==='dark')return true; if(t==='light')return false; return !!(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches); }
function apply_theme(){ let t=null; try{t=localStorage.getItem('eq_theme');}catch(e){} const r=document.documentElement; if(t==='dark'||t==='light')r.setAttribute('data-theme',t); else r.removeAttribute('data-theme'); const d=effective_dark(); Array.prototype.forEach.call(document.querySelectorAll('[data-theme-toggle]'),function(b){ b.textContent=d?'☀ Light':'☾ Dark'; b.title='Switch to '+(d?'light':'dark')+' theme'; }); }
function toggle_theme(){ const d=effective_dark(); try{localStorage.setItem('eq_theme',d?'light':'dark');}catch(e){} apply_theme(); }
function makeThemeBtn(){ const d=effective_dark(); return el('button',{class:'btn ghost','data-theme-toggle':'1','aria-label':'Toggle light or dark theme',onclick:toggle_theme},[d?'☀ Light':'☾ Dark']); }
apply_theme(); if(window.matchMedia){try{window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',apply_theme);}catch(e){}}

// ---- persisted bits ----
function flashCopied(btn, original){ if(!btn) return; btn.textContent='✓ Copied!'; setTimeout(function(){ btn.textContent=original; }, 1500); }
function autoGrow(ta, maxPx){ if(!ta) return; maxPx=maxPx||600; ta.style.height='auto'; var h=Math.min(ta.scrollHeight+2, maxPx); ta.style.height=h+'px'; ta.style.overflowY=(ta.scrollHeight>maxPx)?'auto':'hidden'; }
function eq_modal(title, bodyNode, actions){
  var h=el('div',{class:'modal-h'},[ el('h3',{},[title||'']) ]);
  (actions||[]).forEach(function(a){ if(a) h.appendChild(a); });
  var closeB=el('button',{class:'btn ghost sm',title:'Close (Esc)'},['✕ Close']); h.appendChild(closeB);
  var box=el('div',{class:'modal'},[ h, el('div',{class:'modal-b'},[ bodyNode ]) ]);
  var bg=el('div',{class:'modal-bg'},[ box ]);
  function close(){ if(bg.parentNode) bg.parentNode.removeChild(bg); document.removeEventListener('keydown',onKey); }
  function onKey(e){ if(e.key==='Escape') close(); }
  bg.addEventListener('click',function(e){ if(e.target===bg) close(); });
  closeB.onclick=close; document.addEventListener('keydown',onKey); document.body.appendChild(bg);
  return { close: close };
}
var EQ_URL_RE=/(https?:\/\/[^\s<>()]+|www\.[^\s<>()]+)/gi;
function extractLinks(text){ var m=String(text==null?'':text).match(EQ_URL_RE); return m?m.map(function(u){ return u.replace(/[.,;:)\]]+$/,''); }):[]; }
function linkifyInto(node, text){
  var str=String(text==null?'':text); var re=new RegExp(EQ_URL_RE.source,'gi'); var last=0, m;
  while((m=re.exec(str))){ var url=m[0].replace(/[.,;:)\]]+$/,''); var end=m.index+url.length;
    if(m.index>last) node.appendChild(document.createTextNode(str.slice(last,m.index)));
    (function(u){ var a=el('a',{href:'#',class:'elink',title:'Preview this link in-app'},[u]); a.onclick=function(ev){ ev.preventDefault(); openLinkPreview(u); }; node.appendChild(a); })(url);
    last=end; re.lastIndex=end; }
  if(last<str.length) node.appendChild(document.createTextNode(str.slice(last)));
}
function openLinkPreview(url){
  var safe = /^https?:\/\//i.test(url) ? url : ('https://'+url);
  var info=el('div',{class:'note warn'},['This link came from an email - verify before trusting it: ', el('b',{},[safe])]);
  var openTab=el('a',{class:'btn',href:safe,target:'_blank',rel:'noopener noreferrer'},['Open in new tab ↗']);
  var copyL=el('button',{class:'btn ghost sm'},['Copy link']); copyL.onclick=function(){ copyText(safe,null); flashCopied(copyL,'Copy link'); };
  var frame=el('iframe',{sandbox:'allow-scripts allow-forms allow-popups',referrerpolicy:'no-referrer',src:safe},[]);
  var body=el('div',{},[ info, frame, el('div',{class:'dim',style:'margin-top:6px;font-size:12px'},['If the page is blank, the site blocks embedding - use "Open in new tab".']) ]);
  eq_modal('Link preview', body, [ copyL, openTab ]);
}
function downloadCSV(filename, rows){
  var csv=(rows||[]).map(function(r){ return (r||[]).map(function(c){ var x=String(c==null?'':c); return /[",\n]/.test(x)?('"'+x.replace(/"/g,'""')+'"'):x; }).join(','); }).join('\n');
  var blob=new Blob([csv],{type:'text/csv'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename||'results.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(a.href); },1000);
}
function recordsToRows(records){ var cols=[]; (records||[]).forEach(function(r){ Object.keys(r).forEach(function(k){ if(cols.indexOf(k)<0) cols.push(k); }); }); return [cols].concat((records||[]).map(function(r){ return cols.map(function(c){ var v=r[c]; if(v&&typeof v==='object') v=JSON.stringify(v); return v==null?'':v; }); })); }
function loadJSON(k,d){ try{ return JSON.parse(localStorage.getItem(k)) || d; }catch(e){ return d; } }
function saveJSON(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
var EQ_MAX_RANGE_DAYS=14, EQ_MIN_DATE='2025-01-01';
function eq_today(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function eq_ymd_add(ymd,days){ var d=new Date(Date.parse(ymd+'T00:00:00Z')+days*86400000); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function eq_yesterday(){ return eq_ymd_add(eq_today(),-1); }
function eq_days_between(a,b){ return Math.round((Date.parse(b+'T00:00:00Z')-Date.parse(a+'T00:00:00Z'))/86400000); }
function eq_clamp_date(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }

let state = { queues:[], cases:[], thread:[], queue:null, case:null, provider:'openai', statuses:[], counts:{}, askHistory:[], askShowAll:false, triage:{},
  checked: loadJSON('eq_checked', {}), collapsed:{}, dedupe:true, viewHtml:true, instanceUrl:'', caseQuery:'',
  dateFrom:'', dateTo:'', dateField:'LastModifiedDate', dateAny:false, loaded:false, datesOpen:false, attOnly:false, caseLimit:25, queueCardOpen:true };

// ---- usage analytics (UsageMetrics browser client). ?metrics_test=1 marks the whole session as a
// test run (is_test=1) so the entries are trackable + purgeable from /admin. Fire-and-forget; never
// throws. AI-call events are logged server-side (latency/verdict/success); the browser logs page +
// navigation + interaction events here. ----
var M_TEST = (function(){ try{ if(new URLSearchParams(location.search).get('metrics_test')==='1') sessionStorage.setItem('eq_mtest','1'); }catch(e){} try{ return sessionStorage.getItem('eq_mtest')==='1'; }catch(e){ return false; } })();
var M_BASE = { source:'web', is_test: M_TEST?1:0 };
try{ if(window.UsageMetrics) UsageMetrics.init({ app:'salesforce_email_queue', endpoint:'/api/event',
  allowList:['is_test','source','queue','queue_id','thread_msg_count','has_attachment','attachment_type','correction_scope','context_action','soql_chars','actor'],
  baseProps: M_BASE }); }catch(e){}
var M = { t: M_TEST?1:0, track:function(n,p){ try{ if(window.UsageMetrics) UsageMetrics.track(n, p||{}); }catch(e){} }, setActor:function(a){ try{ M_BASE.actor=a||''; }catch(e){} } };

function renderLogin(msg) {
  document.body.innerHTML = '<div id="app"></div>';
  const u = el('input', { placeholder:'Username', id:'u' });
  const p = el('input', { placeholder:'Password', type:'password', id:'p' });
  const err = el('div', { class:'err' }, [msg||'']);
  const btn = el('button', { class:'btn primary', style:'width:100%', onclick: async function(){ err.textContent=''; try{ await api('/api/login',{method:'POST',body:JSON.stringify({user:u.value,pass:p.value})}); boot(); }catch(e){ err.textContent=(e&&e.message)||'Invalid credentials'; } } }, ['Sign in']);
  p.addEventListener('keydown', function(e){ if(e.key==='Enter') btn.click(); });
  $('#app').appendChild(el('div',{class:'center'},[ el('div',{class:'card login'},[
    el('h1',{},[el('span',{class:'arrow'},['> ']),'Email Queue Assistant']),
    el('div',{class:'sub'},['Read-only proof of concept. Nothing is sent to Salesforce.']),
    el('div',{class:'stack',style:'margin-top:12px'},[ u, p, btn, err ]),
    el('div',{style:'margin-top:12px;text-align:center'},[ makeThemeBtn() ])
  ]) ]));
}

function shell() {
  document.body.innerHTML='';
  const provider = el('select',{style:'width:auto',onchange:function(e){state.provider=e.target.value;}},
    [el('option',{value:'openai'},['ChatGPT (default)']), el('option',{value:'anthropic'},['Claude'])]);
  const logout = el('button',{class:'btn ghost',onclick:async function(){ await fetch('/api/logout',{method:'POST'}); renderLogin('Signed out.'); }},['Sign out']);

  var t=state.triage[cs.case_id]; var tl=t?(TRIAGE_LABEL[t.status]||t.status||''):'';

  chooseFolderBtn.onclick=async function(){
    if(window.showDirectoryPicker){
      let handle; try{ handle=await window.showDirectoryPicker(); }catch(e){ return; } /* cancelled */
      folderMsg.className='note'; folderMsg.textContent='Reading folder...'; var files=[];
      try{ for await (const entry of handle.values()){ if(entry.kind==='file'){ try{ files.push(await entry.getFile()); }catch(e){} } } }catch(e){ folderMsg.className='note warn'; folderMsg.textContent=(e&&e.message)||'Could not read folder'; return; }
      uploadFiles(files, handle.name, folderScope.value);
    } else { folderInput.click(); }
  };
  right.appendChild(acard('Context files (knowledge the AI reads)', [
    el('div',{style:'display:flex;justify-content:space-between;align-items:center'},[ grounding, ctxRefresh ]),
    fileList,
    el('h3',{style:'margin:8px 0 0'},['Add a file']),
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ chooseFileBtn, fileName, scope, upBtn, fileInput ]), upMsg,
    el('h3',{style:'margin:8px 0 0'},['Add a folder (browser reads it)']),
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ chooseFolderBtn, folderScope, folderInput ]), folderMsg
  ], true));
  refreshContext();

  // SOQL (editable; runs read-only server-side) - last card
  const soql="SELECT Id, ParentId, Incoming, MessageDate, Status, Subject, FromAddress, FromName, ToAddress, CcAddress, CreatedBy.Name, HasAttachment, TextBody, HtmlBody\nFROM EmailMessage\nWHERE ParentId = '"+state.case.case_id+"'\nORDER BY MessageDate ASC";
  const soqlBox=el('textarea',{style:'min-height:140px;font-family:monospace;font-size:12px'}); soqlBox.value=soql;
  const soqlMsg=el('div',{class:'note'},[]);
  const soqlResults=el('div',{class:'attext',style:'display:none'},[]);
  var lastRecords=[];
  const soqlTools=el('div',{style:'display:none;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px'},[]);
  const dlCsv=el('button',{class:'btn ghost sm'},['⬇ Download CSV']); dlCsv.onclick=function(){ if(lastRecords.length) downloadCSV('soql_results.csv', recordsToRows(lastRecords)); };
  const expRes=el('button',{class:'btn ghost sm',title:'Open results in a larger window'},['⤢ Expand']); expRes.onclick=function(){ if(!lastRecords.length) return; var d=el('button',{class:'btn ghost sm'},['⬇ Download CSV']); d.onclick=function(){ downloadCSV('soql_results.csv', recordsToRows(lastRecords)); }; eq_modal('SOQL results ('+lastRecords.length+')', recordsToTable(lastRecords), [ d ]); };
  soqlTools.appendChild(dlCsv); soqlTools.appendChild(expRes);
  async function runSoql(box){ var q=String(box.value||'').trim(); soqlResults.style.display='block'; soqlResults.textContent='Running...'; soqlTools.style.display='none';
    try{ const j=await api('/api/soql',{method:'POST',body:JSON.stringify({q:q})}); M.track('soql_run',{ soql_chars:q.length, queue:(state.queue&&state.queue.name)||'' }); lastRecords=j.records||[]; soqlResults.innerHTML='';
      soqlResults.appendChild(el('div',{class:'dim',style:'font-size:11px;margin-bottom:4px'},[(j.total!=null?(j.total+' record(s)'):'')+(j.done===false?' - more not shown':'')]));
      soqlResults.appendChild(recordsToTable(lastRecords)); soqlTools.style.display=lastRecords.length?'flex':'none'; }
    catch(e){ lastRecords=[]; soqlResults.textContent='Error: '+e.message; } }
  const soqlCopy=el('button',{class:'btn'},['📋 Copy SOQL']);
  soqlCopy.onclick=function(){ copyText(soqlBox.value, soqlMsg); flashCopied(soqlCopy,'📋 Copy SOQL'); };
  const runBtn=el('button',{class:'btn',title:'Runs the (edited) query server-side via the read-only connection; results appear below'},['Run query']);
  runBtn.onclick=function(){ runSoql(soqlBox); };
  const caseSoqlBox=el('textarea',{style:'min-height:70px;font-family:monospace;font-size:12px'});
  caseSoqlBox.value="SELECT Id, CaseNumber, Subject, Status, SuppliedEmail FROM Case WHERE Id = '"+state.case.case_id+"'";
  const caseSoqlCopy=el('button',{class:'btn'},['📋 Copy case SOQL']);
  caseSoqlCopy.onclick=function(){ copyText(caseSoqlBox.value, soqlMsg); flashCopied(caseSoqlCopy,'📋 Copy case SOQL'); };
  const caseRunBtn=el('button',{class:'btn'},['Run case query']);
  caseRunBtn.onclick=function(){ runSoql(caseSoqlBox); };
  const wbLink=el('a',{class:'btn ghost',href:'https://workbench.developerforce.com/query.php',target:'_blank',rel:'noopener',title:'Workbench cannot be pre-filled from a link - click Copy SOQL, then paste it into Workbench'},['Open Workbench ↗']);
  right.appendChild(acard('SOQL (editable, runs read-only)', [
    el('div',{class:'note'},['Case Id: '+state.case.case_id+(state.case.case_number?'  ·  Case #'+state.case.case_number:'')+' - edit, then Run (results below) or Copy for Workbench.']),
    el('h3',{style:'margin-top:6px'},['Thread query (EmailMessage)']), soqlBox,
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ runBtn, soqlCopy, wbLink ]),
    el('h3',{style:'margin-top:6px'},['Case query']), caseSoqlBox,
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ caseRunBtn, caseSoqlCopy ]),
    el('h3',{style:'margin-top:6px'},['Results']), soqlTools, soqlResults, soqlMsg
  ], true));

  // auto-draft when the AI status is already 'answer ready' for this case
  if(state.case && state.triage[state.case.case_id] && state.triage[state.case.case_id].status==='answer_ready'){ doDraft(); }
}

async function boot(){
  try{ const me=await api('/api/me'); state.me=me; M.setActor(me&&me.user); shell();
    const r=await Promise.all([ api('/api/queues'), api('/api/statuses').catch(function(){return {statuses:[]};}) ]);
    state.queues=r[0].queues; state.statuses=r[1].statuses||[]; state.instanceUrl=r[0].instance_url||'';
    var sq=loadJSON('eq_queue',''); if(sq){ state.queue=state.queues.find(function(q){return q.id===sq;})||null; }
    renderLeft();
  }catch(e){ if(e.message!=='unauthorized') renderLogin(e.message); }
}
boot();
</script>
</body>
</html>
