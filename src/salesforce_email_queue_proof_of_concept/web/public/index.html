  *{box-sizing:border-box} html,body{margin:0;padding:0;height:100%}

  .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent} .btn.primary:hover{filter:brightness(1.05)}
  .btn.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}

  .atable{border-collapse:collapse;font-size:12px;width:100%} .atable th,.atable td{border:1px solid var(--line);padding:3px 6px;text-align:left;white-space:nowrap} .atable th{background:var(--card);position:sticky;top:0}
  .elink{color:var(--accent);text-decoration:underline;cursor:pointer;word-break:break-all}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}

  .note{font-size:12px;color:var(--dim);margin-top:6px} .warn{color:var(--amber)} .ok{color:var(--green)} .err{color:var(--red);font-size:13px;min-height:16px}
  .askitem{border:1px solid var(--line);border-radius:9px;padding:8px;margin-bottom:7px;background:var(--bg)}
  .askitem .q{font-weight:600;display:flex;justify-content:space-between;gap:8px;align-items:baseline} .qtime{color:var(--dim);font-weight:400;font-size:11px;white-space:nowrap} .askitem .a{white-space:pre-wrap;margin-top:4px}
  #askHist{max-height:240px;overflow:auto;margin-bottom:4px}
  .filelist{font-size:12.5px} .filelist .fi{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px dashed var(--line)}
  .center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px} .login{width:360px}
  label.inline{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--dim);cursor:pointer;min-height:0}
  input[type=checkbox]{width:16px;height:16px;min-height:0;margin:0;cursor:pointer;flex:0 0 auto;accent-color:var(--accent)}

<script>
const $ = function (sel, el) { return (el || document).querySelector(sel); };
function el(tag, attrs, kids) {
  const e = document.createElement(tag);
  for (const k in (attrs || {})) { if (k === 'class') e.className = attrs[k]; else if (k === 'html') e.innerHTML = attrs[k]; else if (k.slice(0,2) === 'on') e.addEventListener(k.slice(2), attrs[k]); else e.setAttribute(k, attrs[k]); }
  (kids || []).forEach(function (c) { if (c == null) return; e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}
async function api(path, opts) {
  const r = await fetch(path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts));
  let j = {}; try { j = await r.json(); } catch (e) {}
  if (r.status === 401) { render_login('Session expired - please sign in.'); throw new Error('unauthorized'); }
  if (!r.ok || j.ok === false) throw new Error((j && j.error) || ('HTTP ' + r.status));
  return j;
}
function copy_text(t, msg) {
  function ok() { /* success shown via the button flashing checked */ }
  function fallback() {
    try { const ta = document.createElement('textarea'); ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); ok(); }
    catch (e) { if (msg) { msg.className = 'note warn'; msg.textContent = 'Copy failed - select the text and copy manually.'; } }
  }
  try { if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(t).then(ok, fallback); return; } } catch (e) {}
  fallback();
}
// ---- theme (transform-style sun/moon) ----
function effective_dark(){ let t=null; try{t=localStorage.getItem('eq_theme');}catch(e){} if(t==='dark')return true; if(t==='light')return false; return !!(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches); }
function apply_theme(){ let t=null; try{t=localStorage.getItem('eq_theme');}catch(e){} const r=document.documentElement; if(t==='dark'||t==='light')r.setAttribute('data-theme',t); else r.removeAttribute('data-theme'); const d=effective_dark(); Array.prototype.forEach.call(document.querySelectorAll('[data-theme-toggle]'),function(b){ b.textContent=d?'☀ Light':'☾ Dark'; b.title='Switch to '+(d?'light':'dark')+' theme'; }); }
function toggle_theme(){ const d=effective_dark(); try{localStorage.setItem('eq_theme',d?'light':'dark');}catch(e){} apply_theme(); try{ if(typeof M!=='undefined') M.track('theme_changed',{ theme: d?'light':'dark' }); }catch(e){} }
function make_theme_btn(){ const d=effective_dark(); return el('button',{class:'btn ghost','data-theme-toggle':'1','aria-label':'Toggle light or dark theme',onclick:toggle_theme},[d?'☀ Light':'☾ Dark']); }
apply_theme(); if(window.matchMedia){try{window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',apply_theme);}catch(e){}}

// ---- persisted bits ----
function flash_copied(btn, original){ if(!btn) return; btn.textContent='✓ Copied!'; setTimeout(function(){ btn.textContent=original; }, 1500); }
function auto_grow(ta, max_px){ if(!ta) return; max_px=max_px||600; ta.style.height='auto'; var h=Math.min(ta.scrollHeight+2, max_px); ta.style.height=h+'px'; ta.style.overflowY=(ta.scrollHeight>max_px)?'auto':'hidden'; }
function eq_modal(title, body_node, actions){
  var h=el('div',{class:'modal-h'},[ el('h3',{},[title||'']) ]);
  (actions||[]).forEach(function(a){ if(a) h.appendChild(a); });
  var close_b=el('button',{class:'btn ghost sm',title:'Close (Esc)'},['✕ Close']); h.appendChild(close_b);
  var box=el('div',{class:'modal'},[ h, el('div',{class:'modal-b'},[ body_node ]) ]);
  var bg=el('div',{class:'modal-bg'},[ box ]);
  function close(){ if(bg.parentNode) bg.parentNode.removeChild(bg); document.removeEventListener('keydown',on_key); }
  function on_key(e){ if(e.key==='Escape') close(); }
  bg.addEventListener('click',function(e){ if(e.target===bg) close(); });
  close_b.onclick=close; document.addEventListener('keydown',on_key); document.body.appendChild(bg);
  return { close: close };
}
var EQ_URL_RE=/(https?:\/\/[^\s<>()]+|www\.[^\s<>()]+)/gi;
function extract_links(text){ var m=String(text==null?'':text).match(EQ_URL_RE); return m?m.map(function(u){ return u.replace(/[.,;:)\]]+$/,''); }):[]; }
function linkify_into(node, text){
  var str=String(text==null?'':text); var re=new RegExp(EQ_URL_RE.source,'gi'); var last=0, m;
  while((m=re.exec(str))){ var url=m[0].replace(/[.,;:)\]]+$/,''); var end=m.index+url.length;
    if(m.index>last) node.appendChild(document.createTextNode(str.slice(last,m.index)));
    (function(u){ var a=el('a',{href:'#',class:'elink',title:'Preview this link in-app'},[u]); a.onclick=function(ev){ ev.preventDefault(); open_link_preview(u); }; node.appendChild(a); })(url);
    last=end; re.lastIndex=end; }
  if(last<str.length) node.appendChild(document.createTextNode(str.slice(last)));
}
function open_link_preview(url){
  try{ if(typeof M!=='undefined') M.track('link_previewed',{}); }catch(e){}
  var safe = /^https?:\/\//i.test(url) ? url : ('https://'+url);
  var info=el('div',{class:'note warn'},['This link came from an email - verify before trusting it: ', el('b',{},[safe])]);
  var open_tab=el('a',{class:'btn',href:safe,target:'_blank',rel:'noopener noreferrer'},['Open in new tab ↗']);
  var copy_l=el('button',{class:'btn ghost sm'},['Copy link']); copy_l.onclick=function(){ copy_text(safe,null); flash_copied(copy_l,'Copy link'); };
  var frame=el('iframe',{sandbox:'allow-scripts allow-forms allow-popups',referrerpolicy:'no-referrer',src:safe},[]);
  var body=el('div',{},[ info, frame, el('div',{class:'dim',style:'margin-top:6px;font-size:12px'},['If the page is blank, the site blocks embedding - use "Open in new tab".']) ]);
  eq_modal('Link preview', body, [ copy_l, open_tab ]);
}
function download_csv(filename, rows){
  var csv=(rows||[]).map(function(r){ return (r||[]).map(function(c){ var x=String(c==null?'':c); return /[",\n]/.test(x)?('"'+x.replace(/"/g,'""')+'"'):x; }).join(','); }).join('\n');
  var blob=new Blob([csv],{type:'text/csv'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename||'results.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){ URL.revokeObjectURL(a.href); },1000);
}
function records_to_rows(records){ var cols=[]; (records||[]).forEach(function(r){ Object.keys(r).forEach(function(k){ if(cols.indexOf(k)<0) cols.push(k); }); }); return [cols].concat((records||[]).map(function(r){ return cols.map(function(c){ var v=r[c]; if(v&&typeof v==='object') v=JSON.stringify(v); return v==null?'':v; }); })); }
function load_json(k,d){ try{ return JSON.parse(localStorage.getItem(k)) || d; }catch(e){ return d; } }
function save_json(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

// ---- workspace reset helpers (snake_case) ----
// Working state = the current queue/case context. Cleared on sign-in + sign-out so a fresh session
// starts blank, but a same-session page refresh keeps it. Preferences (theme, model, column widths)
// are NOT touched here. Keys: eq_queue, eq_status, eq_checked.
function clear_working_state(){
  try{ ['eq_queue','eq_status','eq_checked'].forEach(function(k){ localStorage.removeItem(k); }); }catch(e){}
  state.queue=null; state.cases=[]; state.counts={}; state.case=null; state.thread=[]; state.triage={}; state.checked={};
  state.statuses=[]; state.case_query=''; state.date_from=''; state.date_to=''; state.date_any=false; state.loaded=false;
  // The SPA keeps `state` in memory across sign-out -> sign-in (no reload), so reset the view toggles
  // too: the Queue & filters card should be OPEN on a fresh sign-in to /.
  state.queue_card_open=true; state.dates_open=false; state.att_only=false;
  try{ M.clear_case(); }catch(e){}
}
// Reset button: a full blank slate (but STAY signed in) — also resets preferences to defaults.
function reset_app(){
  clear_working_state();
  try{ ['eq_theme','eq_model','eq_cols'].forEach(function(k){ localStorage.removeItem(k); }); }catch(e){}
  state.provider='openai'; state.model=null;
  try{ M.track('app_reset',{}); }catch(e){}
  shell();              // rebuild the blank shell (re-renders left pane + repopulates the model picker)
  try{ apply_theme(); }catch(e){}   // after shell() so the freshly-built theme toggle shows the right label
}
// Clear the currently-listed cases' triage badges, then run the batch triage fresh.
function retriage_visible(){
  (state.cases||[]).forEach(function(cs){ try{ delete state.triage[cs.case_id]; }catch(e){} });
  try{ render_cases(); }catch(e){}
  try{ triage_visible(); }catch(e){}
  try{ update_triage_refresh(); }catch(e){}
}
// The ↻ Refresh triage button is enabled only once triage has actually been RUN (there are results to
// refresh). If triage was never run there's nothing to refresh, so it stays disabled even if the model
// changed — use "AI triage visible" for the first run.
function triage_refresh_enabled(){ return Object.keys(state.triage||{}).length > 0; }
function update_triage_refresh(){ try{ var b=document.getElementById('triRefresh'); if(b) b.disabled = !triage_refresh_enabled(); }catch(e){} }
var EQ_MAX_RANGE_DAYS=14, EQ_MIN_DATE='2025-01-01';
function eq_today(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function eq_ymd_add(ymd,days){ var d=new Date(Date.parse(ymd+'T00:00:00Z')+days*86400000); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
function eq_yesterday(){ return eq_ymd_add(eq_today(),-1); }
function eq_days_between(a,b){ return Math.round((Date.parse(b+'T00:00:00Z')-Date.parse(a+'T00:00:00Z'))/86400000); }
function eq_clamp_date(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }

let state = { queues:[], cases:[], thread:[], queue:null, case:null, provider:'openai', model:null, models:[], statuses:[], counts:{}, ask_history:[], ask_show_all:false, triage:{},
  checked: load_json('eq_checked', {}), collapsed:{}, dedupe:true, view_html:true, instanceUrl:'', case_query:'',
  date_from:'', date_to:'', date_field:'LastModifiedDate', date_any:false, loaded:false, dates_open:false, att_only:false, case_limit:25, queue_card_open:true };

// ---- usage analytics (UsageMetrics browser client). is_test=1 ONLY when THIS page load's URL has
// ?metrics_test=1 — never from session/storage or any other state — so test entries stay trackable +
// purgeable without ever mis-flagging real activity. Fire-and-forget; never throws. AI-call events are
// logged server-side (latency/verdict/success); the browser logs page + navigation + interaction events. ----
// Test mode is opt-in PER PAGE LOAD via ?metrics_test=1 only — never persisted. (Persisting it in
// sessionStorage leaked the flag into a user's normal activity for the rest of the tab session, which
// wrongly stamped real page_view/thread_opened/ai_call rows as is_test=1.) Admin links to the app carry
// the param explicitly when an admin is deliberately testing; a plain visit to / is real activity.
var M_TEST = (function(){ try{ return new URLSearchParams(location.search).get('metrics_test') === '1'; }catch(e){ return false; } })();
try{ sessionStorage.removeItem('eq_mtest'); }catch(e){}
var M_BASE = { source:'web', is_test: M_TEST?1:0 };
try{ if(window.UsageMetrics) UsageMetrics.init({ app:'salesforce_email_queue', endpoint:'/api/event',
  allowList:['is_test','source','queue','queue_id','case_id','case_number','thread_msg_count','has_attachment','attachment_type','correction_scope','context_action','soql_chars','actor'],
  baseProps: M_BASE, autoPageView:false }); }catch(e){}   // visit is recorded after sign-in (see boot), so it carries the actor
var M = { t: M_TEST?1:0, track:function(n,p){ try{ if(window.UsageMetrics) UsageMetrics.track(n, p||{}); }catch(e){} }, set_actor:function(a){ try{ M_BASE.actor=a||''; }catch(e){} },
  // Sticky current-case context: once an email is opened, every later event carries this case_id/case_number

  set_case:function(c){ try{ M_BASE.case_id=(c&&c.case_id)||''; M_BASE.case_number=(c&&c.case_number)||''; if(c&&c.queue!=null)M_BASE.queue=c.queue; if(c&&c.queue_id!=null)M_BASE.queue_id=c.queue_id; }catch(e){} },

function render_login(msg) {
  // Styled to match the transform's sign-in page exactly (navy full-screen card, USAT-red button,
  // show-password toggle). The POC is a SPA so it posts JSON to /api/login then boot()s in place.
  document.body.innerHTML =
    '<style>body{font:16px system-ui,Arial,sans-serif;background:#0e1b3a;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}'
    + '#eqlf{background:#16233f;padding:24px;border-radius:12px;min-width:280px;box-shadow:0 8px 30px rgba(0,0,0,.4)}'
    + '#eqlf h1{font-size:18px;margin:0 0 14px}'
    + '#eqlf input{display:block;width:100%;box-sizing:border-box;margin:8px 0;padding:10px;border-radius:8px;border:1px solid #2a3a5e;background:#0e1b3a;color:#fff}'
    + '#eqlf button{width:100%;padding:10px;border:0;border-radius:8px;background:#e4002b;color:#fff;font-weight:700;cursor:pointer;margin-top:6px}'
    + '#eqlf .err{color:#ff8a8a;font-size:13px;margin:0 0 8px}'
    + '#eqlf .sub{font-size:12px;color:#8ea3c8;margin:0 0 4px;border-top:1px solid #2a3a5e;padding-top:12px}'
    + '#eqlf label{display:flex;align-items:center;gap:6px;font-size:13px;margin:2px 0 4px;cursor:pointer}#eqlf label input{width:auto;margin:0}</style>'
    + '<form id="eqlf" autocomplete="on">'
    + '<h1>🔒 Email Queue Assistant — Sign in</h1>'
    + '<p class="err" id="eqerr"></p>'
    + '<div class="sub">Sign in to the read-only Email Queue Assistant:</div>'
    + '<input id="u" name="username" placeholder="Username" autofocus autocomplete="username">'
    + '<input id="p" name="password" type="password" placeholder="Password" autocomplete="current-password">'
    + '<label><input type="checkbox" id="eqshow"> Show password</label>'
    + '<button type="submit">Sign in</button></form>';
  var err = document.getElementById('eqerr'); if (msg) err.textContent = msg;
  document.getElementById('eqshow').addEventListener('change', function(){ document.getElementById('p').type = this.checked ? 'text' : 'password'; });
  document.getElementById('eqlf').addEventListener('submit', async function(ev){
    ev.preventDefault(); err.textContent = '';
    try {
      var r = await api('/api/login', { method:'POST', body: JSON.stringify({ user: document.getElementById('u').value, pass: document.getElementById('p').value }) });
      clear_working_state();   // fresh sign-in starts blank (keeps prefs); a same-session refresh keeps the queue
      try{ if(window.UsageMetrics && UsageMetrics.new_session) UsageMetrics.new_session(); }catch(_){}   // each login = a distinct session_id (even in the same tab)
      // Role-based routing: an explicit ?next= wins (deep-link/bounce); otherwise admins go to their
      // configured landing page (set in /admin -> Settings) and everyone else loads the app in place.
      var qs = new URLSearchParams(location.search), nx = qs.get('next');
      var is_admin = r && r.role === 'admin';
      // Admins ALWAYS land (and then navigate) with ?metrics_test=1, so EVERY event in their session
      // — page_view, AI calls, sign_out, etc. — is is_test=1 and easily removable. is_test stays
      // URL-derived; we simply guarantee the param is present for admins. Regular users boot the app
      // in place with no param, so their activity is always real.
      if (is_admin) {
        var target = (nx && /^\/(metrics|admin)\b/.test(nx)) ? nx : (r.landing || '/');
        var sep = target.indexOf('?') >= 0 ? '&' : '?';
        var url = /metrics_test=/.test(target) ? target : (target + sep + 'metrics_test=1');
        if (url === (location.pathname + location.search)) boot(); else location.href = url;
      } else { boot(); }
    }
    catch(e){ err.textContent = (e && e.message) || 'Invalid credentials'; }
  });
}

// Populate the header model picker from the shared registry. Restores the last choice
// (localStorage eq_model), else uses the registry default (is_default). Sets state.provider+model
// so triage/draft/ask all send the SAME chosen model.
function loadModels(){
  var sel=document.getElementById('eq-model'); if(!sel) return;
  api('/api/ai/models').then(function(list){
    state.models = list||[];
    sel.innerHTML='';
    var saved=null; try{ saved=localStorage.getItem('eq_model'); }catch(_){}
    var pick=0;
    (state.models).forEach(function(m,i){
      var o=document.createElement('option'); o.value=m.model; o.textContent=m.label+' · '+m.model;
      o.setAttribute('data-provider', m.provider); sel.appendChild(o);
      if(saved ? (m.model===saved) : m.is_default) pick=i;
    });
    if(state.models.length){ sel.selectedIndex=pick; var m=state.models[pick]; state.model=m.model; state.provider=m.provider; }
  }).catch(function(){ /* leave picker empty; server falls back to env/default */ });
}

    try{ const j=await api('/api/ai/respond',{method:'POST',body:JSON.stringify({case_id:state.case.case_id,case_number:(state.case&&state.case.case_number)||'',queue:state.queue.name,queue_id:(state.queue&&state.queue.id)||'',provider:state.provider,model:state.model,_test:M.t,meta:M.meta()})});
      out.innerHTML=''; out.appendChild(el('span',{class:'badge '+j.verdict},[j.verdict==='draft'?'DRAFT':'NEED INFO']));
      reply.value=j.body||''; auto_grow(reply,600); out.appendChild(el('div',{class:'note'},['Loaded into the editable reply below.'])); ai_banner_clear();
    }catch(e){ out.innerHTML='<div class="err">'+e.message+'</div>'; ai_banner((e&&e.message)||'error'); }
  }
  state._doDraft=doDraft;
  async function doAck(){
    ackBtn.classList.add('sel'); draftBtn.classList.remove('sel');
    out.innerHTML='<div class="dim">Writing acknowledgement ('+state.provider+')...</div>';
    try{ const j=await api('/api/ai/ask',{method:'POST',body:JSON.stringify({case_id:state.case.case_id,case_number:(state.case&&state.case.case_number)||'',queue:state.queue.name,queue_id:(state.queue&&state.queue.id)||'',provider:state.provider,model:state.model,action:'acknowledge',_test:M.t,meta:M.meta(),question:'Write a brief, friendly acknowledgement / holding reply to the customer for this case: confirm we received their message and are looking into it, and that we will follow up. Do NOT promise or invent any specific timeframe, price, policy, email, phone, or other detail that is not in the context. End with the SAME closing sign-off and team signature (team name, phone number, etc.) used in the automated reply in this thread; copy it verbatim if present and do not invent contact details. If the thread has no such sign-off, close simply with "Best regards," and "USA Triathlon". 2-4 sentences plus the sign-off, ready to send.'})});
      out.innerHTML=''; out.appendChild(el('span',{class:'badge draft'},['ACKNOWLEDGEMENT'])); reply.value=j.answer||''; auto_grow(reply,600); out.appendChild(el('div',{class:'note'},['A short holding reply - edit as needed.'])); ai_banner_clear();
    }catch(e){ out.innerHTML='<div class="err">'+e.message+'</div>'; ai_banner((e&&e.message)||'error'); }
  }
  const draftBtn=el('button',{class:'btn',onclick:doDraft},['Draft reply']);
  const ackBtn=el('button',{class:'btn',title:'Generate a short, friendly acknowledgement (no specifics) you can send now',onclick:doAck},['Acknowledge receipt']);
  const sendBtn=el('button',{class:'btn',onclick:async function(){
    sendMsg.textContent='';
    try{ await api('/api/send',{method:'POST',body:JSON.stringify({case_id:state.case.case_id,case_number:(state.case&&state.case.case_number)||'',queue:(state.queue&&state.queue.name)||'',queue_id:(state.queue&&state.queue.id)||'',body:reply.value,_test:M.t,meta:M.meta()})}); sendMsg.className='note ok'; sendMsg.textContent='Sent.'; }
    catch(e){ sendMsg.className='note warn'; sendMsg.textContent=e.message; }
  }},['Send reply']);
  const copyBtn=el('button',{class:'btn'},['📋 Copy reply']);
  copyBtn.onclick=function(){ if(!reply.value.trim()){ sendMsg.className='note'; sendMsg.textContent='Nothing to copy yet - draft or write a reply first.'; return; } copy_text(reply.value, sendMsg); flash_copied(copyBtn,'📋 Copy reply'); M.track('reply_copied',{ ai_reply_chars: reply.value.length }); };
  right.appendChild(acard('AI suggested response', [ el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ draftBtn, ackBtn ]), out,
    el('h3',{style:'margin-top:6px'},['Reply (editable)']), reply,
    el('div',{style:'display:flex;gap:8px;align-items:center'},[ sendBtn, copyBtn ]), sendMsg ], false));


  // Ask with chips + history
  const chips=el('div',{class:'summary'}, ASK_PRESETS.map(function(q){ return el('span',{class:'qchip',onclick:function(){ qbox.value=q; doAsk(); }},[q]); }));
  const hist=el('div',{id:'askHist'},[]);
  const qbox=el('textarea',{placeholder:'Ask a question about this case...',style:'min-height:64px'});
  async function doAsk(){ const q=qbox.value.trim(); if(!q) return; const ts=new Date().toLocaleString(); renderAskHist(true);
    try{ const j=await api('/api/ai/ask',{method:'POST',body:JSON.stringify({case_id:state.case.case_id,case_number:(state.case&&state.case.case_number)||'',queue:state.queue.name,queue_id:(state.queue&&state.queue.id)||'',provider:state.provider,model:state.model,_test:M.t,meta:M.meta(),question:q,history:state.ask_history.slice(-6)})});
      state.ask_history.push({q:q,a:j.answer||'',ts:ts}); qbox.value=''; renderAskHist(); }
    catch(e){ state.ask_history.push({q:q,a:'(error) '+e.message,ts:ts}); renderAskHist(); ai_banner((e&&e.message)||'error'); } }
  function renderAskHist(thinking){
    hist.innerHTML='';
    const items=state.ask_history.slice().reverse(); const N=2;
    if(thinking) hist.appendChild(el('div',{class:'dim',style:'margin-bottom:6px'},['Thinking ('+state.provider+')...']));
    (state.ask_show_all?items:items.slice(0,N)).forEach(function(h){ var cp=el('button',{class:'btn ghost sm',title:'Copy this answer'},['\uD83D\uDCCB Copy']); cp.onclick=function(){ copy_text(h.a, null); flash_copied(cp,'\uD83D\uDCCB Copy'); }; hist.appendChild(el('div',{class:'askitem'},[ el('div',{class:'q'},[ el('span',{},['Q: '+h.q]), el('span',{class:'qtime'},[h.ts||'']) ]), el('div',{class:'a'},[h.a]), el('div',{style:'margin-top:4px'},[ cp ]) ])); });
    if(items.length>N) hist.appendChild(el('button',{class:'btn ghost sm',onclick:function(){ state.ask_show_all=!state.ask_show_all; renderAskHist(); }},[ state.ask_show_all?'See less':('See '+(items.length-N)+' earlier') ]));
    hist.scrollTop=0;
  }
  const askBtn=el('button',{class:'btn',onclick:doAsk},['Ask']);
  right.appendChild(acard('Ask a question', [ chips, hist, qbox, askBtn ], true));

  // Operator corrections (ground future drafts/answers)
  const corrList=el('div',{class:'filelist'},['Loading...']);
  const corrNote=el('textarea',{placeholder:'e.g. Coaching cert processing takes 2-3 weeks, not 4-6. Send renewals to memberservices@usatriathlon.org.',style:'min-height:64px'});
  const corrScope=el('select',{style:'width:auto'},[el('option',{value:'me'},['Just me (your drafts)']),el('option',{value:'queue'},['This queue (all users)']),el('option',{value:'global'},['All queues (all users)'])]);
  corrScope.value='queue';
  const corrMsg=el('div',{class:'note'},[]);
  async function refreshCorr(){ try{ const j=await api('/api/corrections'); corrList.innerHTML=''; var items=(j.corrections||[]).filter(function(c){return c.active;}); if(!items.length){ corrList.appendChild(el('div',{class:'dim'},['(no corrections yet)'])); } items.slice().reverse().slice(0,8).forEach(function(c){ corrList.appendChild(el('div',{class:'fi'},[ el('span',{},[c.note]), el('span',{class:'dim'},[(c.scope||'global')+(c.queue?(' · '+c.queue):'')]) ])); }); }catch(e){ corrList.innerHTML='<div class="err">'+e.message+'</div>'; } }
  const corrBtn=el('button',{class:'btn'},['Add correction']);
  corrBtn.onclick=async function(){ const note=corrNote.value.trim(); if(!note){ corrMsg.className='note'; corrMsg.textContent='Type a correction first.'; return; } corrMsg.className='note'; corrMsg.textContent='Saving...';
    try{ await api('/api/corrections',{method:'POST',body:JSON.stringify({note:note,scope:corrScope.value,queue:state.queue.name,case_id:state.case.case_id})}); M.track('correction_added',{ correction_scope:corrScope.value, queue:(state.queue&&state.queue.name)||'' }); corrNote.value=''; corrMsg.className='note ok'; corrMsg.textContent='Saved - it will ground future drafts & answers.'; refreshCorr(); if(typeof refreshContext==='function') refreshContext(); }
    catch(e){ corrMsg.className='note warn'; corrMsg.textContent=e.message; } };
  right.appendChild(acard('Corrections (teach the AI)', [ el('div',{class:'note'},['Corrections are injected into the AI grounding so future drafts and answers honor them.']), corrList, corrNote, el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ corrScope, corrBtn ]), corrMsg ], true));
  refreshCorr();

  // Context files (list + upload)
  const file_list=el('div',{class:'filelist'},['Loading...']);
  const scope=el('select',{style:'width:auto'},[el('option',{value:'queue'},['This queue only']),el('option',{value:'global'},['Global (all queues)'])]); scope.value='queue';
  const fileInput=el('input',{type:'file',style:'display:none'});
  const fileName=el('span',{class:'dim',style:'font-size:12px'},['No file chosen']);
  fileInput.addEventListener('change',function(){ fileName.textContent=(fileInput.files&&fileInput.files[0])?fileInput.files[0].name:'No file chosen'; });
  const chooseFileBtn=el('button',{class:'btn',title:'Choose a file from your computer'},['Choose a file']);
  chooseFileBtn.onclick=function(){ fileInput.click(); };
  const upMsg=el('div',{class:'note'},[]);
  const grounding=el('div',{class:'note'},['Loading...']);
  function excludeKey(key, excluded){ return api('/api/context-exclude',{method:'POST',body:JSON.stringify({key:key,excluded:excluded})}); }
  function ctxFileRow(f, indent){
    var vb=el('button',{class:'btn ghost sm',title:'View / expand'},['view']); vb.onclick=function(){ viewContextFile(f); };
    var tog=el('button',{class:'btn ghost sm',title: f.excluded?'Include in AI context':'Exclude from AI context (kept on disk)'},[ f.excluded?'include':'exclude' ]);
    tog.onclick=async function(){ try{ await excludeKey(f.key, !f.excluded); refreshContext(); }catch(e){ alert(e.message); } };
    var disp = indent ? (f.name.indexOf('/')>=0 ? f.name.split('/').slice(1).join('/') : f.base) : f.name;
    var nameEl=el('span',{style:(f.excluded?'opacity:.5;text-decoration:line-through;':'')+(indent?'padding-left:16px;':'')},[ disp ]);
    var meta=el('span',{class:'dim'},[ f.scope+' · '+f.size+'b'+(f.excluded?' · excluded':'') ]);
    return el('div',{class:'fi'},[ nameEl, el('span',{style:'display:inline-flex;gap:6px;align-items:center'},[ meta, vb, tog ]) ]);
  }
  async function refreshContext(){ try{ const j=await api('/api/context?queue='+encodeURIComponent(state.queue.name));
      var kc=(j.knowledge_chars||0); var files=j.files||[]; var included=files.filter(function(f){return !f.excluded;}).length;
      grounding.className='note ok'; grounding.textContent='AI is grounding on '+included+' context file(s) ('+kc+' chars) \u00b7 '+(j.corrections||0)+' correction(s).';
      file_list.innerHTML='';
      if(!files.length){ file_list.appendChild(el('div',{class:'dim'},['(no context files yet)'])); }
      var roots=[]; var folders={}; var order=[];
      files.forEach(function(f){ if(f.folder){ if(!folders[f.folder]){ folders[f.folder]={key:f.folder_key,name:f.folder,files:[]}; order.push(f.folder); } folders[f.folder].files.push(f); } else { roots.push(f); } });
      order.sort().forEach(function(name){ var g=folders[name]; var fx=g.files.every(function(x){return x.excluded;});
        var tog=el('button',{class:'btn ghost sm',title:fx?'Include this whole folder':'Exclude this whole folder from context'},[ fx?'include':'exclude' ]);
        tog.onclick=async function(){ try{ await excludeKey(g.key, !fx); refreshContext(); }catch(e){ alert(e.message); } };
        file_list.appendChild(el('div',{class:'fi'},[ el('span',{style:fx?'opacity:.5':''},['📁 '+name+'  ('+g.files.length+' file'+(g.files.length>1?'s':'')+(fx?' · excluded':'')+')']), el('span',{},[ tog ]) ]));
        if(!fx){ g.files.forEach(function(f){ file_list.appendChild(ctxFileRow(f, true)); }); }
      });
      roots.forEach(function(f){ file_list.appendChild(ctxFileRow(f, false)); });
    }catch(e){ file_list.innerHTML='<div class="err">'+e.message+'</div>'; } }
  const upBtn=el('button',{class:'btn',onclick:function(){ const f=fileInput.files&&fileInput.files[0]; if(!f){ upMsg.textContent='Choose a file first.'; return; }
    const rd=new FileReader(); rd.onload=async function(){ const b64=String(rd.result).split(',').pop(); upMsg.className='note'; upMsg.textContent='Uploading...';
      try{ await api('/api/context',{method:'POST',body:JSON.stringify({scope:scope.value,queue:state.queue.name,name:f.name,content_base64:b64})}); M.track('context_changed',{ context_action:'upload', queue:(state.queue&&state.queue.name)||'' }); upMsg.className='note ok'; upMsg.textContent='Uploaded.'; fileInput.value=''; fileName.textContent='No file chosen'; refreshContext(); }
      catch(e){ upMsg.className='note warn'; upMsg.textContent=e.message; } };
    rd.readAsDataURL(f); }},['Upload']);
  const ctxRefresh=el('button',{class:'btn ghost sm',title:'Refresh the context file list',onclick:function(){ refreshContext(); }},['↻ Refresh']);
  function fileToB64(file){ return new Promise(function(res,rej){ var rd=new FileReader(); rd.onload=function(){ res(String(rd.result).split(',').pop()); }; rd.onerror=rej; rd.readAsDataURL(file); }); }
  const folderMsg=el('div',{class:'note'},[]);
  const folderScope=el('select',{style:'width:auto'},[el('option',{value:'queue'},['This queue only']),el('option',{value:'global'},['Global (all queues)'])]); folderScope.value='queue';
  async function uploadFiles(files, folder, scopeVal){ files=files||[]; if(!files.length){ folderMsg.className='note'; folderMsg.textContent='No files found in that folder.'; return; }
    var ok=0, skip=0, i=0;
    for(const file of files){ i++; folderMsg.className='note'; folderMsg.textContent='Reading '+i+'/'+files.length+'...';
      try{ const b64=await fileToB64(file); await api('/api/context',{method:'POST',body:JSON.stringify({scope:(scopeVal||scope.value),queue:state.queue.name,name:file.name,content_base64:b64,folder:folder||''})}); ok++; }
      catch(e){ skip++; } }
    folderMsg.className='note ok'; folderMsg.textContent='Read '+ok+' file(s)'+(skip?(' · skipped '+skip+' (unsupported/too big)'):'')+(folder?(' into folder "'+folder+'"'):'')+'.'; refreshContext(); }
  // Fallback folder input (Safari/Firefox lack the File System Access API).
  const folderInput=el('input',{type:'file',style:'display:none'}); folderInput.setAttribute('webkitdirectory',''); folderInput.setAttribute('directory',''); folderInput.setAttribute('multiple','multiple');
  folderInput.addEventListener('change',function(){ var arr=folderInput.files?Array.prototype.slice.call(folderInput.files):[]; var folder=(arr[0]&&arr[0].webkitRelativePath)?arr[0].webkitRelativePath.split('/')[0]:'uploaded'; uploadFiles(arr, folder, folderScope.value); folderInput.value=''; });
  const chooseFolderBtn=el('button',{class:'btn',title:'Let the browser read a folder on your computer'},['Choose a folder']);
  chooseFolderBtn.onclick=async function(){
    if(window.showDirectoryPicker){
      let handle; try{ handle=await window.showDirectoryPicker(); }catch(e){ return; } /* cancelled */
      folderMsg.className='note'; folderMsg.textContent='Reading folder...'; var files=[];
      try{ for await (const entry of handle.values()){ if(entry.kind==='file'){ try{ files.push(await entry.getFile()); }catch(e){} } } }catch(e){ folderMsg.className='note warn'; folderMsg.textContent=(e&&e.message)||'Could not read folder'; return; }
      uploadFiles(files, handle.name, folderScope.value);
    } else { folderInput.click(); }
  };
  right.appendChild(acard('Context files (knowledge the AI reads)', [
    el('div',{style:'display:flex;justify-content:space-between;align-items:center'},[ grounding, ctxRefresh ]),
    file_list,
    el('h3',{style:'margin:8px 0 0'},['Add a file']),
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ chooseFileBtn, fileName, scope, upBtn, fileInput ]), upMsg,
    el('h3',{style:'margin:8px 0 0'},['Add a folder (browser reads it)']),
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ chooseFolderBtn, folderScope, folderInput ]), folderMsg
  ], true));
  refreshContext();

  // SOQL (editable; runs read-only server-side) - last card
  const soql="SELECT Id, ParentId, Incoming, MessageDate, Status, Subject, FromAddress, FromName, ToAddress, CcAddress, CreatedBy.Name, HasAttachment, TextBody, HtmlBody\nFROM EmailMessage\nWHERE ParentId = '"+state.case.case_id+"'\nORDER BY MessageDate ASC";
  const soqlBox=el('textarea',{style:'min-height:140px;font-family:monospace;font-size:12px'}); soqlBox.value=soql;
  const soqlMsg=el('div',{class:'note'},[]);
  const soqlResults=el('div',{class:'attext',style:'display:none'},[]);
  var lastRecords=[];
  const soqlTools=el('div',{style:'display:none;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px'},[]);
  const dlCsv=el('button',{class:'btn ghost sm'},['⬇ Download CSV']); dlCsv.onclick=function(){ if(lastRecords.length) download_csv('soql_results.csv', records_to_rows(lastRecords)); };
  const expRes=el('button',{class:'btn ghost sm',title:'Open results in a larger window'},['⤢ Expand']); expRes.onclick=function(){ if(!lastRecords.length) return; var d=el('button',{class:'btn ghost sm'},['⬇ Download CSV']); d.onclick=function(){ download_csv('soql_results.csv', records_to_rows(lastRecords)); }; eq_modal('SOQL results ('+lastRecords.length+')', recordsToTable(lastRecords), [ d ]); };
  soqlTools.appendChild(dlCsv); soqlTools.appendChild(expRes);
  async function runSoql(box){ var q=String(box.value||'').trim(); soqlResults.style.display='block'; soqlResults.textContent='Running...'; soqlTools.style.display='none';
    try{ const j=await api('/api/soql',{method:'POST',body:JSON.stringify({q:q})}); M.track('soql_run',{ soql_chars:q.length, queue:(state.queue&&state.queue.name)||'' }); lastRecords=j.records||[]; soqlResults.innerHTML='';
      soqlResults.appendChild(el('div',{class:'dim',style:'font-size:11px;margin-bottom:4px'},[(j.total!=null?(j.total+' record(s)'):'')+(j.done===false?' - more not shown':'')]));
      soqlResults.appendChild(recordsToTable(lastRecords)); soqlTools.style.display=lastRecords.length?'flex':'none'; }
    catch(e){ lastRecords=[]; soqlResults.textContent='Error: '+e.message; } }
  const soqlCopy=el('button',{class:'btn'},['📋 Copy SOQL']);
  soqlCopy.onclick=function(){ copy_text(soqlBox.value, soqlMsg); flash_copied(soqlCopy,'📋 Copy SOQL'); };
  const runBtn=el('button',{class:'btn',title:'Runs the (edited) query server-side via the read-only connection; results appear below'},['Run query']);
  runBtn.onclick=function(){ runSoql(soqlBox); };
  const caseSoqlBox=el('textarea',{style:'min-height:70px;font-family:monospace;font-size:12px'});
  caseSoqlBox.value="SELECT Id, CaseNumber, Subject, Status, SuppliedEmail FROM Case WHERE Id = '"+state.case.case_id+"'";
  const caseSoqlCopy=el('button',{class:'btn'},['📋 Copy case SOQL']);
  caseSoqlCopy.onclick=function(){ copy_text(caseSoqlBox.value, soqlMsg); flash_copied(caseSoqlCopy,'📋 Copy case SOQL'); };
  const caseRunBtn=el('button',{class:'btn'},['Run case query']);
  caseRunBtn.onclick=function(){ runSoql(caseSoqlBox); };
  const wbLink=el('a',{class:'btn ghost',href:'https://workbench.developerforce.com/query.php',target:'_blank',rel:'noopener',title:'Workbench cannot be pre-filled from a link - click Copy SOQL, then paste it into Workbench'},['Open Workbench ↗']);
  right.appendChild(acard('SOQL (editable, runs read-only)', [
    el('div',{class:'note'},['Case Id: '+state.case.case_id+(state.case.case_number?'  ·  Case #'+state.case.case_number:'')+' - edit, then Run (results below) or Copy for Workbench.']),
    el('h3',{style:'margin-top:6px'},['Thread query (EmailMessage)']), soqlBox,
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ runBtn, soqlCopy, wbLink ]),
    el('h3',{style:'margin-top:6px'},['Case query']), caseSoqlBox,
    el('div',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[ caseRunBtn, caseSoqlCopy ]),
    el('h3',{style:'margin-top:6px'},['Results']), soqlTools, soqlResults, soqlMsg
  ], true));

  // auto-draft when the AI status is already 'answer ready' for this case
  if(state.case && state.triage[state.case.case_id] && state.triage[state.case.case_id].status==='answer_ready'){ doDraft(); }
}

async function boot(){
  try{ const me=await api('/api/me'); state.me=me; M.set_actor(me&&me.user); M.track('page_view', {}); shell();
    const r=await Promise.all([ api('/api/queues'), api('/api/statuses').catch(function(){return {statuses:[]};}) ]);
    state.queues=r[0].queues; state.statuses=r[1].statuses||[]; state.instanceUrl=r[0].instance_url||'';
    var sq=load_json('eq_queue',''); if(sq){ state.queue=state.queues.find(function(q){return q.id===sq;})||null; }
    renderLeft();
  }catch(e){ if(e.message!=='unauthorized') render_login(e.message); }
}
boot();
</script>
</body>
</html>
