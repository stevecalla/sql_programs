<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="660" fill="#FFFFFF"/>

  <style>
    .h1   { font-family: Georgia, serif; font-size: 23px; font-weight: 700; fill: #2C2C2A; }
    .sub  { font-size: 13px; fill: #5F5E5A; }
    .job  { font-size: 12.5px; font-weight: 700; fill: #534AB7; letter-spacing: 0.06em; }
    .pt   { font-size: 15.5px; font-weight: 700; fill: #2C2C2A; }
    .ps   { font-size: 12px; fill: #5F5E5A; }
    .note { font-size: 12.5px; fill: #5F5E5A; font-style: italic; }
    .ct   { font-size: 15.5px; font-weight: 700; fill: #2C2C2A; }
    .cd   { font-size: 12px; fill: #5F5E5A; }
    .bdg  { font-size: 12.5px; font-weight: 700; fill: #5F5E5A; }
    .bdgw { font-size: 12.5px; font-weight: 700; fill: #ffffff; }
    .tagn { font-size: 10.5px; font-weight: 600; fill: #5F5E5A; letter-spacing: 0.04em; }
    .tagp { font-size: 10.5px; font-weight: 700; fill: #534AB7; letter-spacing: 0.04em; }
    .foot { font-size: 12.5px; fill: #2C2C2A; }
  </style>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5F5E5A"/>
    </marker>
  </defs>

  <text x="40" y="38" class="h1">The nickname plan — four files, two simple jobs</text>
  <text x="40" y="60" class="sub">Built on top of today's analysis. The current files don't change.</text>

  <text x="40" y="98" class="job">JOB 1 · FIND ALL THE MATCHES (ONCE, ACROSS EVERY RECORD)</text>

  <g>
    <rect x="40"  y="110" width="250" height="58" rx="10" fill="#F4F2FB" stroke="#D3D1C7" stroke-width="1.5"/>
    <text x="60"  y="138" class="pt">Exact</text>
    <text x="60"  y="156" class="ps">same name</text>

    <rect x="325" y="110" width="250" height="58" rx="10" fill="#F4F2FB" stroke="#D3D1C7" stroke-width="1.5"/>
    <text x="345" y="138" class="pt">Fuzzy (90)</text>
    <text x="345" y="156" class="ps">typos &amp; spelling variants</text>

    <rect x="610" y="110" width="250" height="58" rx="10" fill="#F4F2FB" stroke="#D3D1C7" stroke-width="1.5"/>
    <text x="630" y="138" class="pt">Nickname</text>
    <text x="630" y="156" class="ps">Bob = Robert</text>
  </g>

  <text x="450" y="196" text-anchor="middle" class="note">= one pile of match links</text>
  <line x1="450" y1="206" x2="450" y2="236" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#ah)"/>

  <text x="40" y="262" class="job">JOB 2 · EACH FILE SHOWS A SLICE OF THOSE LINKS</text>

  <!-- card a -->
  <rect x="40" y="276" width="190" height="160" rx="12" fill="#FBFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
  <circle cx="64" cy="304" r="13" fill="none" stroke="#B4B2A9" stroke-width="1.5"/>
  <text x="64" y="308" text-anchor="middle" class="bdg">a</text>
  <text x="88" y="309" class="ct">Exact</text>
  <text x="58" y="350" class="cd">identical records</text>
  <rect x="56" y="396" width="124" height="22" rx="11" fill="none" stroke="#D3D1C7" stroke-width="1"/>
  <text x="118" y="411" text-anchor="middle" class="tagn">CURRENT · UNCHANGED</text>

  <!-- card b -->
  <rect x="250" y="276" width="190" height="160" rx="12" fill="#FBFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
  <circle cx="274" cy="304" r="13" fill="none" stroke="#B4B2A9" stroke-width="1.5"/>
  <text x="274" y="308" text-anchor="middle" class="bdg">b</text>
  <text x="298" y="309" class="ct">Fuzzy 90</text>
  <text x="268" y="350" class="cd">typos &amp; variants</text>
  <rect x="266" y="396" width="124" height="22" rx="11" fill="none" stroke="#D3D1C7" stroke-width="1"/>
  <text x="328" y="411" text-anchor="middle" class="tagn">CURRENT · UNCHANGED</text>

  <!-- card c -->
  <rect x="460" y="276" width="190" height="160" rx="12" fill="#FBFAF7" stroke="#D3D1C7" stroke-width="1.5"/>
  <circle cx="484" cy="304" r="13" fill="none" stroke="#B4B2A9" stroke-width="1.5"/>
  <text x="484" y="308" text-anchor="middle" class="bdg">c</text>
  <text x="508" y="309" class="ct">Nickname</text>
  <text x="478" y="350" class="cd">Bob to Robert pairs</text>
  <rect x="478" y="396" width="52" height="22" rx="11" fill="#E7E4FA"/>
  <text x="504" y="411" text-anchor="middle" class="tagp">NEW</text>

  <!-- card d (highlight) -->
  <rect x="670" y="276" width="190" height="160" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2.5"/>
  <circle cx="694" cy="304" r="13" fill="#7F77DD"/>
  <text x="694" y="308" text-anchor="middle" class="bdgw">d</text>
  <text x="718" y="309" class="ct">Consolidated</text>
  <text x="688" y="350" class="cd">everyone linked,</text>
  <text x="688" y="366" class="cd">grouped together</text>
  <rect x="688" y="396" width="158" height="22" rx="11" fill="#DAD6F8"/>
  <text x="767" y="411" text-anchor="middle" class="tagp">NEW · SINGLE SOURCE OF TRUTH</text>

  <line x1="40" y1="478" x2="860" y2="478" stroke="#D3D1C7" stroke-width="1"/>

  <circle cx="46" cy="510" r="3" fill="#7F77DD"/>
  <text x="60" y="514" class="foot">The current three files stay byte-for-byte identical — a safe baseline.</text>

  <circle cx="46" cy="540" r="3" fill="#7F77DD"/>
  <text x="60" y="544" class="foot">Review-only for now, but columns keep Salesforce __c naming, so a future import just works.</text>

  <circle cx="46" cy="570" r="3" fill="#7F77DD"/>
  <text x="60" y="574" class="foot">Run timer, run summary, menu, and all docs get updated too.</text>

  <circle cx="46" cy="600" r="3" fill="#7F77DD"/>
  <text x="60" y="604" class="foot">No coding yet — this is the agreed plan.</text>
</svg>